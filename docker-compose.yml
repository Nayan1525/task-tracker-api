# Local Postgres for development, matching .env.example's default DATABASE_URL.
# Not used in tests — the suite runs against an in-memory SQLite DB
# (tests/conftest.py) so it needs no external service.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: task_tracker
      POSTGRES_PASSWORD: task_tracker
      POSTGRES_DB: task_tracker
    ports:
      # Host port 5433 avoids colliding with a system/local Postgres already
      # on 5432. Update DATABASE_URL to match if you change this.
      - "5433:5432"
    volumes:
      - task_tracker_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U task_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  task_tracker_pgdata:
